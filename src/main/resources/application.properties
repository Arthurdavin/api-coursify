# ?? Server ??????????????????????????????????????????????????????????????????
server.port=8080
spring.application.name=coursify
spring.threads.virtual.enabled=true

# ?? Database ?????????????????????????????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/coursify_kh
spring.datasource.username=postgres
spring.datasource.password=vin1205
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ?? JPA / Hibernate ??????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ?? JWT ???????????????????????????????????????????????????????????????????????
jwt.secret=dGhpcy1pcy1teS1zdXBlci1zZWNyZXQta2V5LWZvci1jb3Vyc2lmeS0yMDI0LWFwcA==
jwt.expiration=604800000

# ?? File Upload ???????????????????????????????????????????????????????????????
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ?? Swagger / OpenAPI ?????????????????????????????????????????????????????????
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.com.coursify=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=WARN


