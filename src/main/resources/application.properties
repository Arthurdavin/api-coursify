# ?? Server
server.port=${PORT:8080}
spring.application.name=coursify
spring.threads.virtual.enabled=true

# ?? Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/coursify_kh}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:vin1205}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ?? JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ?? JWT
jwt.secret=${JWT_SECRET:dGhpcy1pcy1teS1zdXBlci1zZWNyZXQta2V5LWZvci1jb3Vyc2lmeS0yMDI0LWFwcA==}
jwt.expiration=${JWT_EXPIRATION:604800000}

# ?? File Upload
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# ?? Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ?? Logging
logging.level.com.coursify=INFO
logging.level.org.springframework.security=WARN

# ?? Mail (Gmail SMTP)
